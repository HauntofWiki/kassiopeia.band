name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to wickyvps
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 5.78.181.176
          username: richard
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/kassiopeia.band
            git pull --ff-only origin main
            HEAD_LOCAL=$(git rev-parse HEAD)
            HEAD_REMOTE=$(git rev-parse origin/main)
            if [ "$HEAD_LOCAL" != "$HEAD_REMOTE" ]; then
              echo "::error::HEAD ($HEAD_LOCAL) != origin/main ($HEAD_REMOTE) after pull — working tree likely dirty"
              exit 1
            fi
            cd /opt/cloud/wickycloud/kassiopeia
            docker compose build --no-cache frontend backend
            docker compose up -d --force-recreate frontend backend
