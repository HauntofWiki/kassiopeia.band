server {
    listen 80;
    client_max_body_size 512m;
    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://kassiopeia-backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /uploads/ {
        proxy_pass http://kassiopeia-backend:8000/uploads/;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
